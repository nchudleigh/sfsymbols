name: release
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: Build universal binary
        run: make universal
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/sfsymbols
          generate_release_notes: true
