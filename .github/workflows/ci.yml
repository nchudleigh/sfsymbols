name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - run: go vet ./...
      - run: test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)
      - run: go build ./...
      - run: make test
